<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — EnglishPath</title>
  <meta name="description" content="Contact EnglishPath for support, privacy requests or feedback." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { DEFAULT: "#d63384", dark: "#b82a6f" } } } } };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-gray-50 text-gray-900">
  <header class="border-b border-gray-100 bg-white">
    <div class="mx-auto flex max-w-3xl items-center justify-between px-4 py-3">
      <a href="index.html" class="flex items-center gap-2">
        <span class="grid h-9 w-9 place-items-center rounded-lg bg-brand text-white font-extrabold">E</span>
        <span class="text-lg font-extrabold" data-brand>EnglishPath</span>
      </a>
      <a href="index.html" class="text-sm font-medium text-gray-600 hover:text-brand">Home</a>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-4 py-12">
    <h1 class="text-3xl font-extrabold tracking-tight text-brand">Contact</h1>
    <p class="mt-2 text-sm text-gray-500">Questions, feedback or privacy requests — we read every message.</p>

    <div class="mt-8 rounded-2xl border border-gray-100 bg-white p-8 shadow-sm">
      <p class="text-sm text-gray-600">
        Email us at
        <a id="contact-email" href="mailto:art.tatan@gmail.com" class="font-semibold text-brand hover:underline">art.tatan@gmail.com</a>.
      </p>
      <p class="mt-4 text-sm text-gray-600">Or send a short message (opens your email app):</p>

      <form id="contact-form" class="mt-5 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700" for="name">Your name</label>
          <input id="name" type="text" required
                 class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-indigo-100" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700" for="email">Your email</label>
          <input id="email" type="email" required
                 class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-indigo-100" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700" for="message">Message</label>
          <textarea id="message" required rows="5"
                    class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-indigo-100"></textarea>
        </div>
        <button type="submit"
                class="rounded-lg bg-brand px-5 py-2.5 text-sm font-semibold text-white hover:bg-brand-dark">
          Open email draft
        </button>
      </form>
      <p class="mt-3 text-xs text-gray-400">This uses your device’s mail app. No message is stored on our servers.</p>
    </div>

    <p class="mt-10 text-sm">
      <a href="privacy.html" class="font-semibold text-brand hover:underline">Privacy Policy</a>
      ·
      <a href="terms.html" class="font-semibold text-brand hover:underline">Terms of Service</a>
    </p>
  </main>

  <script src="js/data.js"></script>
  <script src="js/cookies.js"></script>
  <script>
    document.querySelectorAll("[data-brand]").forEach((el) => (el.textContent = window.SITE?.brand || "EnglishPath"));
    document.getElementById("contact-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();
      const subject = encodeURIComponent("EnglishPath contact from " + name);
      const body = encodeURIComponent("From: " + name + " <" + email + ">\n\n" + message);
      window.location.href = "mailto:art.tatan@gmail.com?subject=" + subject + "&body=" + body;
    });
  </script>
</body>
</html>
