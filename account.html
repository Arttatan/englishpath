<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My account — EnglishPath</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { DEFAULT: "#d63384", dark: "#b82a6f" } } } } };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-gray-50 text-gray-900">
  <header class="sticky top-0 z-50 border-b border-gray-100 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
      <a href="index.html" class="flex items-center gap-2">
        <span class="grid h-9 w-9 place-items-center rounded-lg bg-brand text-white font-extrabold">E</span>
        <span class="text-lg font-extrabold tracking-tight" data-brand>EnglishPath</span>
      </a>
      <nav class="hidden items-center gap-1 md:flex">
        <a href="index.html#levels" class="rounded-md px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">Levels</a>
        <div id="auth-desktop" class="flex items-center gap-1"></div>
      </nav>
      <button id="burger" class="rounded-md p-2 text-gray-700 hover:bg-gray-100 md:hidden" aria-label="Menu">☰</button>
    </div>
    <div id="mobile-menu" class="hidden border-t border-gray-100 px-4 py-3 md:hidden">
      <a href="index.html#levels" class="block rounded-md px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">Levels</a>
      <div id="auth-mobile"></div>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-4 py-10">
    <h1 class="text-3xl font-extrabold tracking-tight text-brand">My account</h1>
    <p id="account-email" class="mt-2 text-sm text-gray-500">Loading…</p>

    <section class="mt-8 grid gap-4 sm:grid-cols-3">
      <div class="rounded-xl bg-white p-5 shadow-sm ring-1 ring-gray-100">
        <p class="text-xs font-medium uppercase tracking-wide text-gray-400">Lessons done</p>
        <p id="stat-lessons" class="mt-2 text-3xl font-extrabold text-gray-900">—</p>
      </div>
      <div class="rounded-xl bg-white p-5 shadow-sm ring-1 ring-gray-100">
        <p class="text-xs font-medium uppercase tracking-wide text-gray-400">Average score</p>
        <p id="stat-avg" class="mt-2 text-3xl font-extrabold text-gray-900">—</p>
      </div>
      <div class="rounded-xl bg-white p-5 shadow-sm ring-1 ring-gray-100">
        <p class="text-xs font-medium uppercase tracking-wide text-gray-400">Plan</p>
        <p id="stat-plan" class="mt-2 text-xl font-extrabold text-gray-900">Free</p>
        <p class="mt-1 text-xs text-gray-400">Premium (ad-free) coming later</p>
      </div>
    </section>

    <section class="mt-10">
      <div class="flex items-end justify-between gap-3">
        <h2 class="text-lg font-bold text-gray-900">Recent progress</h2>
        <a href="index.html#levels" class="text-sm font-semibold text-brand hover:underline">Continue learning →</a>
      </div>
      <p id="progress-status" class="mt-2 text-sm text-gray-500">Loading your progress…</p>
      <div id="progress-list" class="mt-4 space-y-3"></div>
    </section>

    <section class="mt-10 rounded-xl bg-white p-5 shadow-sm ring-1 ring-gray-100">
      <h2 class="text-lg font-bold text-gray-900">Account</h2>
      <ul class="mt-3 space-y-2 text-sm text-gray-600">
        <li><a href="forgot-password.html" class="font-medium text-brand hover:underline">Change password</a></li>
        <li><a href="index.html" class="font-medium text-brand hover:underline">Back to home</a></li>
      </ul>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/account.js"></script>
  <script src="js/cookies.js"></script>
</body>
</html>
