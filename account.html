<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My account — EnglishPath</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { DEFAULT: "#d63384", dark: "#b82a6f" } } } } };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-gray-50 text-gray-900">
  <header class="sticky top-0 z-50 border-b border-gray-100 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
      <a href="index.html" class="flex items-center gap-2">
        <span class="grid h-9 w-9 place-items-center rounded-lg bg-brand text-white font-extrabold">E</span>
        <span class="text-lg font-extrabold tracking-tight" data-brand>EnglishPath</span>
      </a>
      <nav class="hidden items-center gap-1 md:flex">
        <a href="index.html#levels" class="rounded-md px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">Levels</a>
        <div id="auth-desktop" class="flex items-center gap-1"></div>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-lg px-4 py-16 text-center">
    <h1 class="text-2xl font-extrabold text-brand">My account</h1>
    <p id="account-email" class="mt-3 text-sm text-gray-500"></p>
    <p class="mt-6 text-gray-600">Progress tracking and subscription management are coming soon.</p>
    <a href="index.html" class="mt-8 inline-block rounded-lg bg-brand px-6 py-3 text-sm font-semibold text-white hover:bg-brand-dark">Back to home</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.querySelectorAll("[data-brand]").forEach((el) => (el.textContent = window.SITE?.brand || "EnglishPath"));
    window.sb?.auth.getSession().then(({ data }) => {
      if (!data?.session) {
        window.location.href = "login.html";
        return;
      }
      document.getElementById("account-email").textContent = data.session.user.email;
    });
  </script>
</body>
</html>
