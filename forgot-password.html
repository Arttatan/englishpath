<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password — EnglishPath</title>
  <meta name="description" content="Reset your EnglishPath password." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { DEFAULT: "#d63384", dark: "#b82a6f" } } } } };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="min-h-screen bg-gray-50 text-gray-900">

  <header class="border-b border-gray-100 bg-white">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
      <a href="index.html" class="flex items-center gap-2">
        <span class="grid h-9 w-9 place-items-center rounded-lg bg-brand text-white font-extrabold">E</span>
        <span class="text-lg font-extrabold tracking-tight" data-brand>EnglishPath</span>
      </a>
      <a href="login.html" class="text-sm font-medium text-gray-600 hover:text-brand">Back to log in</a>
    </div>
  </header>

  <main class="mx-auto flex max-w-md flex-col px-4 py-12">
    <div class="rounded-2xl border border-gray-100 bg-white p-8 shadow-sm">
      <h1 class="text-2xl font-extrabold tracking-tight">Forgot your password?</h1>
      <p class="mt-1 text-sm text-gray-500">Enter your email and we'll send you a reset link.</p>

      <div id="message" class="mt-5 hidden rounded-lg px-4 py-3 text-sm"></div>

      <form id="forgot-form" class="mt-5 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700" for="email">Email</label>
          <input id="email" type="email" required autocomplete="email"
                 class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-indigo-100"
                 placeholder="you@example.com" />
        </div>
        <button id="submit-btn" type="submit"
                class="w-full rounded-lg bg-brand px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-dark disabled:opacity-60">
          Send reset link
        </button>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    document.querySelectorAll("[data-brand]").forEach((el) => (el.textContent = "EnglishPath"));

    const form = document.getElementById("forgot-form");
    const msg = document.getElementById("message");
    const btn = document.getElementById("submit-btn");

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className =
        "mt-5 rounded-lg px-4 py-3 text-sm " +
        (type === "error" ? "bg-red-50 text-red-700" : "bg-green-50 text-green-700");
      msg.classList.remove("hidden");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!window.SUPABASE_READY) {
        showMessage("Setup needed: open js/config.js and paste your Supabase Project URL and anon key.", "error");
        return;
      }

      const email = document.getElementById("email").value.trim();
      btn.disabled = true;
      btn.textContent = "Sending...";

      // The reset link in the email will open update-password.html
      const redirectTo = window.location.href.replace(/forgot-password\.html.*$/, "update-password.html");

      const { error } = await window.sb.auth.resetPasswordForEmail(email, { redirectTo });

      btn.disabled = false;
      btn.textContent = "Send reset link";

      if (error) {
        showMessage(error.message, "error");
        return;
      }

      showMessage("If that email exists, we've sent a reset link. Check your inbox.", "success");
      form.reset();
    });
  </script>
</body>
</html>
