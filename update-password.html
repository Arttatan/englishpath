<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set a new password — EnglishPath</title>
  <meta name="description" content="Set a new password for your EnglishPath account." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { DEFAULT: "#d63384", dark: "#b82a6f" } } } } };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="min-h-screen bg-gray-50 text-gray-900">

  <header class="border-b border-gray-100 bg-white">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
      <a href="index.html" class="flex items-center gap-2">
        <span class="grid h-9 w-9 place-items-center rounded-lg bg-brand text-white font-extrabold">E</span>
        <span class="text-lg font-extrabold tracking-tight" data-brand>EnglishPath</span>
      </a>
    </div>
  </header>

  <main class="mx-auto flex max-w-md flex-col px-4 py-12">
    <div class="rounded-2xl border border-gray-100 bg-white p-8 shadow-sm">
      <h1 class="text-2xl font-extrabold tracking-tight">Set a new password</h1>
      <p id="subtitle" class="mt-1 text-sm text-gray-500">Enter a new password for your account.</p>

      <div id="message" class="mt-5 hidden rounded-lg px-4 py-3 text-sm"></div>

      <form id="update-form" class="mt-5 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700" for="password">New password</label>
          <input id="password" type="password" required minlength="6" autocomplete="new-password"
                 class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-indigo-100"
                 placeholder="At least 6 characters" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700" for="password2">Confirm new password</label>
          <input id="password2" type="password" required minlength="6" autocomplete="new-password"
                 class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-indigo-100"
                 placeholder="Repeat the new password" />
        </div>
        <button id="submit-btn" type="submit"
                class="w-full rounded-lg bg-brand px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-dark disabled:opacity-60">
          Save new password
        </button>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    document.querySelectorAll("[data-brand]").forEach((el) => (el.textContent = "EnglishPath"));

    const form = document.getElementById("update-form");
    const msg = document.getElementById("message");
    const btn = document.getElementById("submit-btn");
    const subtitle = document.getElementById("subtitle");

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className =
        "mt-5 rounded-lg px-4 py-3 text-sm " +
        (type === "error" ? "bg-red-50 text-red-700" : "bg-green-50 text-green-700");
      msg.classList.remove("hidden");
    }

    // When the user arrives from the reset email, Supabase creates a temporary
    // recovery session. We only allow setting a new password if that session exists.
    let canUpdate = false;

    if (window.SUPABASE_READY) {
      window.sb.auth.onAuthStateChange((event) => {
        if (event === "PASSWORD_RECOVERY" || event === "SIGNED_IN") {
          canUpdate = true;
        }
      });
      // Also check current session (in case the event fired before this code ran)
      window.sb.auth.getSession().then(({ data }) => {
        if (data.session) canUpdate = true;
      });
    } else {
      showMessage("Setup needed: open js/config.js and paste your Supabase Project URL and anon key.", "error");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!window.SUPABASE_READY) return;

      const password = document.getElementById("password").value;
      const password2 = document.getElementById("password2").value;

      if (password !== password2) {
        showMessage("Passwords do not match.", "error");
        return;
      }
      if (!canUpdate) {
        showMessage("This page must be opened from the password reset link in your email.", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Saving...";

      const { error } = await window.sb.auth.updateUser({ password });

      btn.disabled = false;
      btn.textContent = "Save new password";

      if (error) {
        showMessage(error.message, "error");
        return;
      }

      form.classList.add("hidden");
      subtitle.classList.add("hidden");
      showMessage("Your password has been updated. You can now log in with your new password.", "success");
    });
  </script>
</body>
</html>
